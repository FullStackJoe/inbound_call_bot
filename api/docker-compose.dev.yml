services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: happyrobot
      POSTGRES_USER: happyrobot
      POSTGRES_PASSWORD: happyrobot
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happyrobot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://happyrobot:happyrobot@db:5432/happyrobot
      API_KEY: test-key
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_dev:
