services:
  db:
    image: postgres:16-alpine
    env_file:
      - ../api/.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-happyrobot}
      POSTGRES_USER: ${POSTGRES_USER:-happyrobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-happyrobot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-happyrobot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  api:
    build: ../api
    env_file:
      - ../api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-happyrobot}:${POSTGRES_PASSWORD:-happyrobot}@db:5432/${POSTGRES_DB:-happyrobot}
      API_KEY: ${API_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped

  ui:
    build:
      context: ../database_ui
      args:
        VITE_API_URL: ""
    networks:
      - frontend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file:
      - ../api/.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - ui
    networks:
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:

networks:
  backend:
  frontend:
