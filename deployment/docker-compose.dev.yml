services:
  db:
    image: postgres:16-alpine
    env_file:
      - ../api/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U happyrobot"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ../api
    env_file:
      - ../api/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../database_ui:/app
      - ui_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  pgdata_dev:
  ui_node_modules:
